<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sinan Aydoğan Aim Trainer - Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0d1117; font-family: 'Segoe UI', sans-serif; color: white; }
        
        #viewport {
            width: 100vw; height: 100vh;
            perspective: 2000px; /* Karakteri iyice geriye çektik */
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        #world {
            position: absolute;
            width: 4000px; height: 3000px;
            background: radial-gradient(circle, #1f2933 1px, transparent 1px);
            background-size: 100px 100px;
            transform-style: preserve-3d;
            /* Dünyayı biraz ileri iterek FOV etkisini artırıyoruz */
            transform: translateZ(-500px); 
            will-change: transform;
        }

        #watermark {
            position: absolute;
            font-size: 120px; font-weight: 900;
            color: rgba(255, 255, 255, 0.03);
            pointer-events: none; user-select: none;
            text-transform: uppercase;
        }

        /* Artı Nişangah */
        #crosshair {
            position: fixed; top: 50%; left: 50%;
            width: 20px; height: 20px;
            transform: translate(-50%, -50%);
            z-index: 100; pointer-events: none;
        }
        .ch-h { position: absolute; top: 9px; width: 20px; height: 2px; background: #0f0; box-shadow: 0 0 2px #000; }
        .ch-v { position: absolute; left: 9px; height: 20px; width: 2px; background: #0f0; box-shadow: 0 0 2px #000; }

        /* Silah */
        #weapon {
            position: fixed; bottom: -40px; right: 18%;
            width: 160px; height: 320px;
            background: linear-gradient(to top, #000, #222);
            border-radius: 25px 25px 0 0; z-index: 90;
        }

        .balloon {
            position: absolute;
            width: 45px; height: 60px;
            background: #ff4655;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 70, 85, 0.5);
            transition: transform 0.05s linear;
        }

        #ui {
            position: fixed; top: 20px; left: 20px;
            background: rgba(15, 25, 35, 0.95);
            padding: 15px; border-left: 5px solid #ff4655; z-index: 200;
        }
        input { width: 60px; background: #222; color: #fff; border: 1px solid #444; padding: 4px; }
    </style>
</head>
<body>

<div id="ui">
    <div style="font-size: 20px; font-weight: bold;">SKOR: <span id="score">0</span></div>
    <hr style="border: 0.5px solid #333; margin: 10px 0;">
    <label style="font-size: 11px;">VALORANT SENS:</label><br>
    <input type="number" id="valSens" value="0.5" step="0.1"><br><br>
    <label style="font-size: 11px;">KAÇIŞ HIZI:</label><br>
    <input type="range" id="speed" min="1" max="15" value="6">
</div>

<div id="crosshair"><div class="ch-h"></div><div class="ch-v"></div></div>
<div id="weapon"></div>

<div id="viewport">
    <div id="world">
        <div id="watermark">SINAN AYDOĞAN AIM TRAINER</div>
        <div id="target" class="balloon"></div>
    </div>
</div>

<script>
    const world = document.getElementById('world');
    const target = document.getElementById('target');
    const weapon = document.getElementById('weapon');
    const scoreText = document.getElementById('score');
    const valSensInput = document.getElementById('valSens');
    const speedInput = document.getElementById('speed');

    let score = 0;
    // Kamera başlangıç pozisyonu (Dünya merkezi)
    let viewX = -2000 + (window.innerWidth / 2);
    let viewY = -1500 + (window.innerHeight / 2);

    document.addEventListener('mousemove', (e) => {
        if (document.pointerLockElement === document.body) {
            let sens = parseFloat(valSensInput.value) || 0.5;
            
            // Daha akıcı bir dönüş çarpanı
            viewX -= e.movementX * sens * 1.5;
            viewY -= e.movementY * sens * 1.5;

            // Kamera Sınırları (Dünyanın dışına çıkmayı engelle)
            viewX = Math.max(-2800, Math.min(-1200, viewX));
            viewY = Math.max(-2000, Math.min(-1000, viewY));

            world.style.transform = `translateZ(-500px) translate(${viewX}px, ${viewY}px)`;
            
            // Silah sarsıntısı
            weapon.style.transform = `translateX(${-e.movementX * 0.15}px) translateY(${-e.movementY * 0.15}px)`;
        }
    });

    document.body.addEventListener('click', () => {
        document.body.requestPointerLock();
    });

    function spawn() {
        // Balonu dar bir alanda (merkezde) tutuyoruz
        // X: 1700-2300, Y: 1300-1700 arası (Görüş alanının göbeği)
        const rx = 1700 + Math.random() * 600; 
        const ry = 1300 + Math.random() * 400;
        target.style.left = rx + 'px';
        target.style.top = ry + 'px';
        target.style.display = "block";
    }

    document.addEventListener('mousedown', () => {
        if (document.pointerLockElement === document.body) {
            const rect = target.getBoundingClientRect();
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;

            if (cx >= rect.left && cx <= rect.right && cy >= rect.top && cy <= rect.bottom) {
                score++;
                scoreText.innerText = score;
                target.style.display = "none";
                setTimeout(spawn, 50);
            }
        }
    });

    // Balon Kaçış Sistemi - Sınırlar içinde kalmaya zorla
    setInterval(() => {
        if (document.pointerLockElement !== document.body) return;
        
        const rect = target.getBoundingClientRect();
        const dist = Math.sqrt(Math.pow((window.innerWidth/2) - (rect.left+22), 2) + Math.pow((window.innerHeight/2) - (rect.top+30), 2));

        if (dist < 110) {
            let s = parseInt(speedInput.value);
            let currX = parseFloat(target.style.left);
            let currY = parseFloat(target.style.top);

            let moveX = (Math.random() - 0.5) * s * 10;
            let moveY = (Math.random() - 0.5) * s * 10;

            // Sınır Koruması: Balon 1600-2400 X ve 1200-1800 Y dışına çıkmasın
            if (currX < 1650) moveX = Math.abs(moveX) * 2;
            if (currX > 2350) moveX = -Math.abs(moveX) * 2;
            if (currY < 1250) moveY = Math.abs(moveY) * 2;
            if (currY > 1750) moveY = -Math.abs(moveY) * 2;

            target.style.left = (currX + moveX) + 'px';
            target.style.top = (currY + moveY) + 'px';
        }
    }, 30);

    spawn();
</script>
</body>
</html>
