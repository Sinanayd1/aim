<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sinan Aydoğan Aim Trainer - Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background-color: #0d1117; font-family: 'Segoe UI', sans-serif; color: white; }
        
        /* Başlat Menüsü */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 17, 23, 0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 500;
        }

        #start-btn {
            padding: 20px 50px; font-size: 24px; font-weight: bold;
            background: #ff4655; color: white; border: none; border-radius: 5px;
            cursor: pointer; transition: 0.2s;
        }
        #start-btn:hover { background: #ff5e6a; transform: scale(1.05); }

        #game-container {
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        #world {
            position: absolute;
            width: 4000px; height: 3000px;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.3s;
        }

        .bg-dots { background: radial-gradient(circle, #21262d 2px, transparent 2px); background-size: 60px 60px; }
        .bg-grid { background-image: linear-gradient(#161b22 1px, transparent 1px), linear-gradient(90deg, #161b22 1px, transparent 1px); background-size: 50px 50px; }
        .bg-dark { background-color: #050505; }

        #watermark {
            position: absolute; font-size: 100px; font-weight: 900;
            color: rgba(255, 255, 255, 0.03); pointer-events: none; user-select: none;
            text-transform: uppercase; text-align: center;
        }

        /* Nişangah */
        #crosshair { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; pointer-events: none; }
        .ch-part { background: #fff; box-shadow: 0 0 2px #000; position: absolute; }

        /* Hedef Tipleri */
        .target { position: absolute; z-index: 10; cursor: none; }
        .type-balloon { width: 45px; height: 60px; background: #ff4655; border-radius: 50%; }
        .type-orb { width: 40px; height: 40px; background: #00f2ff; border-radius: 50%; box-shadow: 0 0 20px #00f2ff; }
        .type-cube { width: 35px; height: 35px; background: #ffcc00; border: 2px solid #fff; }

        /* Arayüz */
        #ui {
            position: fixed; top: 20px; left: 20px;
            background: rgba(13, 17, 23, 0.95);
            padding: 15px; border: 1px solid #30363d; border-left: 4px solid #fff; z-index: 200;
            width: 240px;
        }
        select, input { width: 100%; background: #21262d; color: white; border: 1px solid #484f58; padding: 5px; margin: 5px 0 10px 0; }
        label { font-size: 11px; font-weight: bold; color: #8b949e; }
    </style>
</head>
<body>

<div id="start-overlay">
    <h1 style="margin-bottom: 20px; letter-spacing: 5px;">SINAN AYDOĞAN</h1>
    <button id="start-btn">OYUNU BAŞLAT</button>
    <p style="margin-top: 15px; color: #6e7681;">Kamerayı bırakmak için <b>ESC</b>'ye bas.</p>
</div>

<div id="ui">
    <div style="background: rgba(255,255,255,0.05); padding: 10px; border-radius: 5px; margin-bottom: 10px;">
        <div>SKOR: <span id="score">0</span></div>
        <div>İSABET: <span id="accuracy">100</span>%</div>
    </div>
    
    <label>OYUN MODU:</label>
    <select id="gameMode">
        <option value="flick">Klasik (Flick)</option>
        <option value="tracking">Takip (Tracking)</option>
        <option value="multi">Çoklu (Multi)</option>
    </select>

    <label>HEDEF TİPİ:</label>
    <select id="targetType">
        <option value="type-balloon">Kırmızı Balon</option>
        <option value="type-orb">Mavi Küre</option>
        <option value="type-cube">Sarı Küp</option>
    </select>

    <label>ARKA PLAN:</label>
    <select id="bgType">
        <option value="bg-dots">Noktalı</option>
        <option value="bg-grid">Izgara</option>
        <option value="bg-dark">Saf Karanlık</option>
    </select>

    <label>VAL SENS:</label>
    <input type="number" id="valSens" value="0.5" step="0.1">
</div>

<div id="crosshair">
    <div class="ch-part" style="width:20px; height:2px; left:-10px; top:-1px;"></div>
    <div class="ch-part" style="width:2px; height:20px; left:-1px; top:-10px;"></div>
</div>

<div id="game-container">
    <div id="world" class="bg-dots">
        <div id="watermark">SINAN AYDOĞAN<br>AIM TRAINER</div>
    </div>
</div>

<script>
    const world = document.getElementById('world');
    const scoreText = document.getElementById('score');
    const accText = document.getElementById('accuracy');
    const valSensInput = document.getElementById('valSens');
    const startOverlay = document.getElementById('start-overlay');
    const startBtn = document.getElementById('start-btn');
    const gameModeSelect = document.getElementById('gameMode');

    let score = 0, shots = 0, hits = 0;
    let viewX = 0, viewY = 0;
    let isGameRunning = false;
    let trackingAngle = 0;

    // BAŞLAT BUTONU
    startBtn.onclick = () => {
        document.body.requestPointerLock();
    };

    document.addEventListener('pointerlockchange', () => {
        if (document.pointerLockElement === document.body) {
            startOverlay.style.display = 'none';
            isGameRunning = true;
            resetAndSpawn();
        } else {
            startOverlay.style.display = 'flex';
            isGameRunning = false;
            clearTargets();
        }
    });

    // HEDEFLERİ TEMİZLE VE YENİDEN OLUŞTUR
    function resetAndSpawn() {
        clearTargets();
        const mode = gameModeSelect.value;
        const count = mode === 'multi' ? 5 : 1;
        for(let i=0; i<count; i++) spawn();
    }

    function clearTargets() {
        document.querySelectorAll('.target').forEach(t => t.remove());
    }

    function spawn() {
        if(!isGameRunning) return;
        const t = document.createElement('div');
        const type = document.getElementById('targetType').value;
        t.className = `target ${type}`;
        t.style.left = (1500 + (Math.random()-0.5)*1000) + 'px';
        t.style.top = (1500 + (Math.random()-0.5)*800) + 'px';
        world.appendChild(t);
    }

    // KAMERA
    document.addEventListener('mousemove', (e) => {
        if (document.pointerLockElement === document.body) {
            let sens = parseFloat(valSensInput.value) || 0.5;
            viewX -= e.movementX * sens * 1.5;
            viewY -= e.movementY * sens * 1.5;
            viewX = Math.max(-1200, Math.min(1200, viewX));
            viewY = Math.max(-1000, Math.min(1000, viewY));
            world.style.transform = `translate(${viewX}px, ${viewY}px)`;
        }
    });

    // ATEŞ MANTIĞI
    document.addEventListener('mousedown', () => {
        if (!isGameRunning) return;
        shots++;
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        let hitDetected = false;

        document.querySelectorAll('.target').forEach(t => {
            const r = t.getBoundingClientRect();
            if (cx >= r.left && cx <= r.right && cy >= r.top && cy <= r.bottom) {
                hits++; score++;
                t.remove();
                spawn();
                hitDetected = true;
            }
        });
        
        accText.innerText = Math.floor((hits / shots) * 100);
        scoreText.innerText = score;
    });

    // TRACKING DÖNGÜSÜ
    setInterval(() => {
        if (!isGameRunning || gameModeSelect.value !== 'tracking') return;
        const t = document.querySelector('.target');
        if (t) {
            trackingAngle += 0.05;
            let tx = parseFloat(t.style.left);
            t.style.left = (tx + Math.sin(trackingAngle) * 10) + 'px';
            
            // Otomatik Puan (Takip Ediyorsa)
            const r = t.getBoundingClientRect();
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            if (cx >= r.left && cx <= r.right && cy >= r.top && cy <= r.bottom) {
                score += 0.1;
                scoreText.innerText = Math.floor(score);
            }
        }
    }, 30);

    // AYAR DEĞİŞİKLİKLERİ
    document.getElementById('bgType').onchange = (e) => world.className = e.target.value;
    gameModeSelect.onchange = resetAndSpawn;
    document.getElementById('targetType').onchange = resetAndSpawn;

</script>
</body>
</html>
