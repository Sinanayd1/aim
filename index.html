<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sinan Aydoğan FPS Aim Trainer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background-color: #0d1117; font-family: 'Segoe UI', sans-serif; color: white; cursor: none; }
        
        /* GİRİŞ LOBİSİ */
        #lobby-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a232e 0%, #0d1117 100%);
            display: flex; flex-direction: row; gap: 40px; align-items: center; justify-content: center;
            z-index: 500; transition: 0.3s;
        }

        #lobby-content {
            background: rgba(22, 27, 34, 0.95);
            padding: 25px 35px; border-radius: 15px; border: 1px solid #30363d;
            width: 440px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        #high-score-display {
            background: rgba(255, 70, 85, 0.1); border: 1px solid #ff4655;
            padding: 10px; border-radius: 8px; margin-bottom: 15px; text-align: center;
            color: #ff4655; font-weight: bold; letter-spacing: 1px;
        }

        #preview-box {
            width: 350px; height: 350px; border-radius: 15px; border: 2px solid #484f58;
            box-shadow: 0 0 30px rgba(0,0,0,0.5); position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        #preview-label {
            position: absolute; top: 10px; left: 10px; font-size: 10px; font-weight: bold;
            background: rgba(0,0,0,0.7); padding: 3px 8px; border-radius: 4px; color: #8b949e; z-index: 20;
        }

        .bg-dots { background: radial-gradient(circle, #21262d 2px, transparent 2px); background-size: 60px 60px; }
        .bg-grid { background-image: linear-gradient(#161b22 1px, transparent 1px), linear-gradient(90deg, #161b22 1px, transparent 1px); background-size: 50px 50px; }
        .bg-dark { background-color: #050505; }

        .form-row { display: flex; gap: 15px; }
        .form-col { flex: 1; }
        select, input { 
            width: 100%; background: #21262d; color: white; border: 1px solid #484f58; 
            padding: 8px; margin: 5px 0 12px 0; border-radius: 6px; font-size: 13px; outline: none;
        }
        label { font-size: 10px; font-weight: bold; color: #8b949e; text-transform: uppercase; display: block; }

        #start-btn {
            width: 100%; padding: 15px; font-size: 16px; font-weight: bold; letter-spacing: 1px;
            background: #ff4655; color: white; border: none; border-radius: 8px;
            cursor: pointer; transition: 0.2s; margin-top: 5px;
        }
        #start-btn:hover { background: #ff5e6a; transform: translateY(-2px); }

        #result-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 17, 23, 0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 600; text-align: center;
        }
        .result-box {
            background: #161b22; padding: 40px; border-radius: 15px; border: 1px solid #30363d;
            box-shadow: 0 0 50px rgba(255, 70, 85, 0.2); width: 400px;
        }
        .res-stat { font-size: 20px; font-weight: bold; margin: 10px 0; color: #fff; }
        .res-val { color: #ff4655; font-size: 28px; }
        #lobby-btn {
            margin-top: 20px; padding: 12px 30px; font-size: 16px; font-weight: bold;
            background: #21262d; color: white; border: 1px solid #484f58; border-radius: 8px; cursor: pointer;
        }
        #lobby-btn:hover { background: #30363d; }

        /* HUD */
        #hud {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            display: none; gap: 40px; background: rgba(13, 17, 23, 0.8);
            padding: 10px 40px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1);
            z-index: 100; font-weight: bold; letter-spacing: 2px;
        }
        .hud-item { display: flex; flex-direction: column; align-items: center; }
        .hud-label { font-size: 10px; color: #8b949e; margin-bottom: 2px; }

        #world {
            position: absolute; width: 3000px; height: 3000px;
            display: flex; align-items: center; justify-content: center;
        }
        #watermark {
            position: absolute; font-size: 100px; font-weight: 900;
            color: rgba(255, 255, 255, 0.03); pointer-events: none; user-select: none; text-align: center;
        }

        .ch-part { background: #fff; position: absolute; box-shadow: 0 0 2px #000; }
        #crosshair { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; pointer-events: none; }
        
        /* HEDEFLER */
        .target { position: absolute; z-index: 10; cursor: none; transition: left 0.1s ease-out, top 0.1s ease-out; }
        .type-balloon { width: 45px; height: 60px; background: #ff4655; border-radius: 50%; box-shadow: 0 0 15px rgba(255, 70, 85, 0.5); }
        .type-orb { width: 40px; height: 40px; background: #00f2ff; border-radius: 50%; box-shadow: 0 0 20px rgba(0, 242, 255, 0.5); }
        .type-cube { width: 35px; height: 35px; background: #ffcc00; border: 2px solid #fff; box-shadow: 0 0 15px rgba(255, 204, 0, 0.5); }

        /* --- SİLAH SİSTEMİ (CSS İLE TABANCA VE RECOIL) --- */
        #weapon {
            position: fixed; bottom: -20px; right: 20%;
            width: 150px; height: 280px;
            display: none; /* Lobi varken gizli */
            z-index: 90;
            pointer-events: none;
            will-change: transform;
            /* Recoil (Tepme) için akıcı geçiş */
            transition: transform 0.05s ease-out, bottom 0.05s ease-out;
        }

        /* Tabanca Gövdesi */
        .gun-slide {
            position: absolute; bottom: 80px; width: 150px; height: 40px;
            background: linear-gradient(to top, #1a1a1a, #333);
            border-radius: 5px 5px 0 0;
        }
        /* Tabanca Kabzası */
        .gun-grip {
            position: absolute; bottom: 0; right: 20px; width: 50px; height: 100px;
            background: #222; border: 2px solid #111;
            border-radius: 0 0 10px 10px;
        }
        /* Namlu Ucu */
        .gun-slide::before {
            content: ''; position: absolute; left: 10px; top: 10px; width: 10px; height: 10px;
            background: #000; border-radius: 50%;
        }

    </style>
</head>
<body>

<div id="lobby-overlay">
    <div id="lobby-content">
        <h1 style="margin-bottom: 5px; letter-spacing: 3px; color: #ff4655; font-size: 24px; text-align: center;">SINAN AYDOĞAN</h1>
        
        <div id="high-score-display">🏆 KLASİK REKORU: <span id="lobby-high-score">0</span></div>
        
        <div class="form-row">
            <div class="form-col">
                <label>Hedef Tipi</label>
                <select id="targetType">
                    <option value="type-balloon">Kırmızı Balon</option>
                    <option value="type-orb">Mavi Küre</option>
                    <option value="type-cube">Sarı Küp</option>
                </select>
            </div>
            <div class="form-col">
                <label>Hedef Boyutu</label>
                <input type="range" id="targetSize" min="0.5" max="2" step="0.1" value="1">
            </div>
        </div>

        <label>Valorant Sens</label>
        <input type="number" id="valSens" value="0.5" step="0.1">

        <button id="start-btn">OYUNA BAŞLA</button>
        <p style="margin-top: 10px; color: #484f58; font-size: 11px; text-align: center;">Kamerayı bırakmak için <b>ESC</b> tuşuna bas.</p>
    </div>

    <div id="preview-box" class="bg-dots">
        <div id="preview-label">CANLI ÖNİZLEME</div>
        <div id="crosshair" class="ch-part" style="width:20px; height:2px; left:50%; top:50%; transform:translate(-50%,-50%);"></div>
        <div class="target type-balloon" style="position: relative; margin-left: 80px; margin-top: 40px;"></div>
    </div>
</div>

<div id="result-overlay">
    <div class="result-box">
        <h1 style="color: #ff4655; margin-bottom: 20px;">SÜRE BİTTİ!</h1>
        <div class="res-stat">SKOR: <span class="res-val" id="res-score">0</span></div>
        <div class="res-stat">İSABET: <span class="res-val" id="res-acc">0%</span></div>
        <button id="lobby-btn">LOBİYE DÖN</button>
    </div>
</div>

<div id="hud">
    <div class="hud-item"><span class="hud-label">SKOR</span><span id="score">0</span></div>
    <div class="hud-item"><span class="hud-label">SÜRE</span><span id="timer">01:00</span></div>
    <div class="hud-item"><span class="hud-label">İSABET</span><span id="accuracy">100</span>%</div>
</div>

<div id="crosshair">
    <div class="ch-part" style="width:20px; height:2px; left:-10px; top:-1px;"></div>
    <div class="ch-part" style="width:2px; height:20px; left:-1px; top:-10px;"></div>
</div>

<div id="weapon">
    <div class="gun-slide"></div>
    <div class="gun-grip"></div>
</div>

<div id="game-container">
    <div id="world" class="bg-dots">
        <div id="watermark">SINAN AYDOĞAN<br>AIM TRAINER</div>
    </div>
</div>

<script>
    const world = document.getElementById('world');
    const hud = document.getElementById('hud');
    const lobby = document.getElementById('lobby-overlay');
    const resultOverlay = document.getElementById('result-overlay');
    const weapon = document.getElementById('weapon'); // Silah referansı
    
    const scoreText = document.getElementById('score');
    const timerText = document.getElementById('timer');
    const accText = document.getElementById('accuracy');
    
    const valSensInput = document.getElementById('valSens');
    const startBtn = document.getElementById('start-btn');
    const lobbyBtn = document.getElementById('lobby-btn');
    const targetTypeSelect = document.getElementById('targetType');
    const targetSizeInput = document.getElementById('targetSize');
    
    let score = 0, shots = 0, hits = 0;
    let viewX = 0, viewY = 0, gameState = 'lobby'; 
    let timerInterval;
    let timeLeft = 60; // 1 dakikalık antrenman
    
    // Rekor Sistemi
    let highScore = localStorage.getItem('sinanFlickScore') || 0;
    document.getElementById('lobby-high-score').innerText = highScore;

    startBtn.onclick = () => document.body.requestPointerLock();
    
    lobbyBtn.onclick = () => {
        resultOverlay.style.display = 'none';
        lobby.style.display = 'flex';
        weapon.style.display = 'none'; // Silahı gizle
        gameState = 'lobby';
    };

    document.addEventListener('pointerlockchange', () => {
        if (document.pointerLockElement === document.body) {
            if (gameState === 'lobby' || gameState === 'result') startGame();
        } else {
            if (gameState === 'playing') {
                lobby.style.display = 'flex';
                hud.style.display = 'none';
                weapon.style.display = 'none'; // Silahı gizle
                clearAllTargets();
                clearInterval(timerInterval);
                gameState = 'lobby';
            }
        }
    });

    function startGame() {
        gameState = 'playing';
        lobby.style.display = 'none';
        resultOverlay.style.display = 'none';
        hud.style.display = 'flex';
        weapon.style.display = 'block'; // Silahı göster
        world.className = "bg-dots";
        
        score = 0; shots = 0; hits = 0; viewX = 0; viewY = 0; timeLeft = 60;
        document.getElementById('new-record-msg').style.display = 'none';
        
        updateStats();
        resetTargets();
        
        clearInterval(timerInterval);
        timerInterval = setInterval(gameTick, 1000); // 1s sürecek zamanlayıcı
    }

    function endGame() {
        gameState = 'result';
        document.exitPointerLock(); 
        clearInterval(timerInterval);
        hud.style.display = 'none';
        weapon.style.display = 'none'; // Silahı gizle
        clearAllTargets();
        
        document.getElementById('res-score').innerText = Math.floor(score);
        document.getElementById('res-acc').innerText = shots === 0 ? "100%" : Math.floor((hits / shots) * 100) + "%";
        
        if (score > highScore) { 
            highScore = Math.floor(score);
            localStorage.setItem('sinanFlickScore', highScore);
            document.getElementById('new-record-msg').style.display = 'block';
            document.getElementById('lobby-high-score').innerText = highScore;
        }
        
        resultOverlay.style.display = 'flex';
    }

    function resetTargets() {
        clearAllTargets();
        spawn();
    }

    function clearAllTargets() {
        document.querySelectorAll('#world .target').forEach(t => t.remove());
    }

    // MERKEZ ODAKLI DOĞMA
    function spawn() {
        if(gameState !== 'playing') return;
        const t = document.createElement('div');
        t.className = `target ${targetTypeSelect.value}`;
        t.style.transform = `scale(${targetSizeInput.value})`;
        
        const rx = 1500 + (Math.random()-0.5) * 800; 
        const ry = 1500 + (Math.random()-0.5) * 600; 
        
        t.style.left = rx + 'px';
        t.style.top = ry + 'px';
        world.appendChild(t);
    }

    // KAMERA VE SİLAH TAKİBİ (Gun Sway)
    document.addEventListener('mousemove', (e) => {
        if (gameState === 'playing') {
            let sens = parseFloat(valSensInput.value) || 0.5;
            viewX -= e.movementX * sens * 1.5;
            viewY -= e.movementY * sens * 1.5;
            
            viewX = Math.max(-1000, Math.min(1000, viewX));
            viewY = Math.max(-800, Math.min(800, viewY));
            world.style.transform = `translate(${viewX}px, ${viewY}px)`;

            // Gun Sway: Silah fare yönüne hafifçe gecikmeli bakar
            // Bu, silahın "ağır" ve "gerçekçi" hissetmesini sağlar.
            const swayX = e.movementX * sens * 0.2; // Sağ-Sol sallanma
            const swayY = e.movementY * sens * 0.2; // Yukarı-Aşağı sallanma
            
            // Silahın pozisyonunu ve açısını hafifçe değiştir
            weapon.style.transform = `translate(${swayX}px, ${-20 + swayY}px) rotate(${-2 - swayX/5}deg)`;
        }
    });

    // ATEŞ MANTIĞI VE RECOIL
    document.addEventListener('mousedown', () => {
        if (gameState !== 'playing') return;
        
        shots++;
        
        // --- RECOIL (SİLAH TEPME) EFEKTİ ---
        weapon.style.transition = "0s"; // Hızlı tepme için transition'ı sıfırla
        // Silahı aniden yukarı ve geriye at
        weapon.style.transform = "translate(0px, -70px) rotate(-10deg)";
        
        // 50ms sonra eski haline akıcı bir şekilde döndür
        setTimeout(() => {
            weapon.style.transition = "transform 0.2s ease-out"; // Süzülerek geri dönme
            weapon.style.transform = "translate(0px, -20px) rotate(-2deg)";
        }, 50);

        // Vuruş Algılama
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        document.querySelectorAll('#world .target').forEach(t => {
            const r = t.getBoundingClientRect();
            if (cx >= r.left && cx <= r.right && cy >= r.top && cy <= r.bottom) {
                hits++; score++;
                t.remove();
                spawn();
            }
        });
        
        updateStats();
    });

    function updateStats() {
        scoreText.innerText = Math.floor(score);
        accText.innerText = shots === 0 ? 100 : Math.floor((hits / shots) * 100);
    }

    function gameTick() {
        if (gameState !== 'playing') return;
        timeLeft--;
        const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
        const s = (timeLeft % 60).toString().padStart(2, '0');
        timerText.innerText = `${m}:${s}`;
        if (timeLeft <= 0) endGame();
    }

</script>
</body>
</html>
