<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Valorant Aim Trainer - Stabil Sürüm</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f1923; font-family: sans-serif; color: white; }
        
        /* Kamera Görüş Alanı */
        #viewport {
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Oyun Dünyası */
        #world {
            position: absolute;
            width: 5000px; height: 5000px;
            background: radial-gradient(circle, #1f2933 2px, transparent 2px);
            background-size: 80px 80px;
            transform-style: preserve-3d;
            will-change: transform;
        }

        /* ARTİ NİŞANGAH */
        #crosshair {
            position: fixed; top: 50%; left: 50%;
            width: 20px; height: 20px;
            transform: translate(-50%, -50%);
            z-index: 100; pointer-events: none;
        }
        .ch-h { position: absolute; top: 9px; left: 0; width: 20px; height: 2px; background: #0f0; box-shadow: 0 0 2px #000; }
        .ch-v { position: absolute; left: 9px; top: 0; width: 2px; height: 20px; background: #0f0; box-shadow: 0 0 2px #000; }

        /* Silah */
        #weapon {
            position: fixed; bottom: -20px; right: 20%;
            width: 140px; height: 280px;
            background: #2a2a2a; border: 2px solid #111;
            border-radius: 20px 20px 0 0; z-index: 90;
        }

        /* Balon */
        .balloon {
            position: absolute;
            width: 50px; height: 65px;
            background: #ff4655;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 70, 85, 0.4);
        }

        /* Arayüz */
        #ui {
            position: fixed; top: 20px; left: 20px;
            background: rgba(15, 25, 35, 0.9);
            padding: 15px; border-left: 4px solid #ff4655; z-index: 200;
        }
        input { width: 80px; background: #333; color: white; border: 1px solid #555; margin: 5px; padding: 3px; }
        label { font-size: 12px; }
    </style>
</head>
<body>

<div id="ui">
    <div style="font-size: 20px; font-weight: bold;">SKOR: <span id="score">0</span></div>
    <hr style="border: 0.5px solid #444;">
    <label>Valorant Sens:</label>
    <input type="number" id="valSens" value="0.5" step="0.1"><br>
    <label>Kaçış Hızı:</label>
    <input type="range" id="speed" min="1" max="15" value="5">
    <p style="font-size: 10px; color: #aaa;">Tıkla: Başla | ESC: Çık</p>
</div>

<div id="crosshair"><div class="ch-h"></div><div class="ch-v"></div></div>
<div id="weapon"></div>

<div id="viewport">
    <div id="world">
        <div id="target" class="balloon"></div>
    </div>
</div>

<script>
    const world = document.getElementById('world');
    const target = document.getElementById('target');
    const weapon = document.getElementById('weapon');
    const scoreText = document.getElementById('score');
    const valSensInput = document.getElementById('valSens');
    const speedInput = document.getElementById('speed');

    let score = 0;
    let viewX = -2500 + (window.innerWidth / 2);
    let viewY = -2500 + (window.innerHeight / 2);

    // Hareket Sistemi
    document.addEventListener('mousemove', (e) => {
        if (document.pointerLockElement === document.body) {
            let sens = parseFloat(valSensInput.value) || 0.5;
            viewX -= e.movementX * sens * 2;
            viewY -= e.movementY * sens * 2;

            // Sınırlar
            viewX = Math.max(-4500, Math.min(0, viewX));
            viewY = Math.max(-4500, Math.min(0, viewY));

            world.style.transform = `translate(${viewX}px, ${viewY}px)`;
            weapon.style.transform = `translateX(${-e.movementX * 0.1}px) translateY(${-e.movementY * 0.1}px)`;
        }
    });

    // Başlatma
    document.body.addEventListener('click', () => {
        document.body.requestPointerLock();
    });

    // Yeni Balon
    function spawn() {
        // Balonu ekranın görebileceğin orta kısımlarına atar
        const rx = 2500 + (Math.random() - 0.5) * 1000;
        const ry = 2500 + (Math.random() - 0.5) * 800;
        target.style.left = rx + 'px';
        target.style.top = ry + 'px';
    }

    // Ateş Etme
    document.addEventListener('mousedown', () => {
        if (document.pointerLockElement === document.body) {
            const rect = target.getBoundingClientRect();
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;

            if (cx >= rect.left && cx <= rect.right && cy >= rect.top && cy <= rect.bottom) {
                score++;
                scoreText.innerText = score;
                spawn();
            }
        }
    });

    // Kaçma Mantığı
    setInterval(() => {
        if (document.pointerLockElement !== document.body) return;
        const rect = target.getBoundingClientRect();
        const dist = Math.sqrt(Math.pow((window.innerWidth/2) - (rect.left+25), 2) + Math.pow((window.innerHeight/2) - (rect.top+32), 2));

        if (dist < 100) {
            let s = parseInt(speedInput.value);
            target.style.left = (parseFloat(target.style.left) + (Math.random()-0.5) * s * 10) + 'px';
            target.style.top = (parseFloat(target.style.top) + (Math.random()-0.5) * s * 10) + 'px';
        }
    }, 40);

    spawn();
</script>
</body>
</html
