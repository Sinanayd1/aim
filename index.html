<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sinan Aydoğan Aim Trainer</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f1923; font-family: 'Segoe UI', sans-serif; color: white; }
        
        #viewport {
            width: 100vw; height: 100vh;
            perspective: 1200px; /* Karakteri geride tutma hissi (FOV) */
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* Oyun Dünyası */
        #world {
            position: absolute;
            width: 3000px; height: 2000px;
            background: 
                radial-gradient(circle, #1f2933 2px, transparent 2px);
            background-size: 80px 80px;
            transform-style: preserve-3d;
            display: flex; align-items: center; justify-content: center;
        }

        /* Arka Plan Yazısı */
        #watermark {
            position: absolute;
            font-size: 150px;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.03); /* Çok hafif şeffaf */
            white-space: nowrap;
            pointer-events: none;
            user-select: none;
            text-transform: uppercase;
        }

        /* Artı Nişangah */
        #crosshair {
            position: fixed; top: 50%; left: 50%;
            width: 24px; height: 24px;
            transform: translate(-50%, -50%);
            z-index: 100; pointer-events: none;
        }
        .ch-h { position: absolute; top: 11px; width: 24px; height: 2px; background: #0f0; box-shadow: 0 0 3px #000; }
        .ch-v { position: absolute; left: 11px; height: 24px; width: 2px; background: #0f0; box-shadow: 0 0 3px #000; }

        /* Silah (Geride ve Daha Sağda) */
        #weapon {
            position: fixed; bottom: -30px; right: 15%;
            width: 180px; height: 350px;
            background: linear-gradient(to top, #050505, #1a1a1a);
            border-radius: 30px 30px 0 0; z-index: 90;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .balloon {
            position: absolute;
            width: 50px; height: 70px;
            background: #ff4655;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(255, 70, 85, 0.4);
            transition: transform 0.1s;
        }

        #ui {
            position: fixed; top: 20px; left: 20px;
            background: rgba(15, 25, 35, 0.9);
            padding: 20px; border-left: 5px solid #ff4655; z-index: 200;
        }
        input { width: 70px; background: #333; color: white; border: 1px solid #555; padding: 5px; }
    </style>
</head>
<body>

<div id="ui">
    <div style="font-size: 24px; font-weight: bold; letter-spacing: 2px;">SKOR: <span id="score">0</span></div>
    <hr style="border: 0.5px solid #444; margin: 15px 0;">
    <label>Valorant Sens:</label>
    <input type="number" id="valSens" value="0.5" step="0.1"><br><br>
    <label>Kaçış Hızı:</label>
    <input type="range" id="speed" min="1" max="20" value="8">
</div>

<div id="crosshair"><div class="ch-h"></div><div class="ch-v"></div></div>
<div id="weapon"></div>

<div id="viewport">
    <div id="world">
        <div id="watermark">SINAN AYDOĞAN AIM TRAINER</div>
        <div id="target" class="balloon"></div>
    </div>
</div>

<script>
    const world = document.getElementById('world');
    const target = document.getElementById('target');
    const weapon = document.getElementById('weapon');
    const scoreText = document.getElementById('score');
    const valSensInput = document.getElementById('valSens');
    const speedInput = document.getElementById('speed');

    let score = 0;
    // Dünyanın merkezi
    let viewX = -1500 + (window.innerWidth / 2);
    let viewY = -1000 + (window.innerHeight / 2);

    document.addEventListener('mousemove', (e) => {
        if (document.pointerLockElement === document.body) {
            let sens = parseFloat(valSensInput.value) || 0.5;
            
            // Kamera dönüşü
            viewX -= e.movementX * sens * 1.8;
            viewY -= e.movementY * sens * 1.8;

            // Kamera Sınırları (Siyah ekrana düşmemek için)
            viewX = Math.max(-2500, Math.min(-500, viewX));
            viewY = Math.max(-1500, Math.min(-500, viewY));

            world.style.transform = `translate(${viewX}px, ${viewY}px)`;
            
            // Silah tepkisi
            weapon.style.transform = `translateX(${-e.movementX * 0.1}px) translateY(${-e.movementY * 0.1}px) rotate(${-e.movementX * 0.02}deg)`;
        }
    });

    document.body.addEventListener('click', () => {
        document.body.requestPointerLock();
    });

    function spawn() {
        // Balonu SİNAN AYDOĞAN yazısının civarında tutan sınırlar
        // Bu sınırlar balonun asla kaybolmamasını sağlar
        const rx = 1500 + (Math.random() - 0.5) * 800; 
        const ry = 1000 + (Math.random() - 0.5) * 600;
        target.style.left = rx + 'px';
        target.style.top = ry + 'px';
        target.style.display = "block";
    }

    document.addEventListener('mousedown', () => {
        if (document.pointerLockElement === document.body) {
            const rect = target.getBoundingClientRect();
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;

            if (cx >= rect.left && cx <= rect.right && cy >= rect.top && cy <= rect.bottom) {
                score++;
                scoreText.innerText = score;
                target.style.display = "none";
                setTimeout(spawn, 50);
            }
        }
    });

    // Balon Kaçış Sistemi (Daha akıllı ve sınırları koruyan)
    setInterval(() => {
        if (document.pointerLockElement !== document.body) return;
        
        const rect = target.getBoundingClientRect();
        const dist = Math.sqrt(Math.pow((window.innerWidth/2) - (rect.left+25), 2) + Math.pow((window.innerHeight/2) - (rect.top+35), 2));

        if (dist < 130) {
            let s = parseInt(speedInput.value);
            let currX = parseFloat(target.style.left);
            let currY = parseFloat(target.style.top);

            // Kaçarken merkeze yakın durmaya zorla
            let moveX = (Math.random() - 0.5) * s * 12;
            let moveY = (Math.random() - 0.5) * s * 12;

            // Sınır koruması: Eğer balon çok kenara giderse merkeze doğru it
            if (currX < 1100) moveX = Math.abs(moveX);
            if (currX > 1900) moveX = -Math.abs(moveX);
            if (currY < 700) moveY = Math.abs(moveY);
            if (currY > 1300) moveY = -Math.abs(moveY);

            target.style.left = (currX + moveX) + 'px';
            target.style.top = (currY + moveY) + 'px';
        }
    }, 30);

    spawn();
</script>
</body>
</html>
